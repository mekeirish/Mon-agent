<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a1a1a; color: #eee; font-family: sans-serif; padding: 20px; }
        .card { background: #222; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; box-sizing: border-box; }
        .btn-blue { background: #4facfe; color: #000; }
        .btn-green { background: #00c853; color: #fff; }
        #log { background: #000; color: #0f0; padding: 10px; height: 120px; overflow: auto; font-size: 11px; font-family: monospace; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="card">
        <input type="password" id="gk" placeholder="Clé Gemini">
        <input type="password" id="gt" placeholder="Token GitHub">
        <input type="text" id="rp" placeholder="Pseudo/Dépôt">
        <a href="javascript:void(0);" onclick="saveConfig()" class="btn btn-blue">💾 SAUVEGARDER CONFIG</a>
    </div>

    <div class="card">
        <textarea id="pr" rows="3" placeholder="Action (ex: Fond en bleu)"></textarea>
        <a href="javascript:void(0);" onclick="runAgent()" class="btn btn-green">⚡ EXÉCUTER L'IA</a>
    </div>

    <div id="log" class="card">Prêt...</div>

<script>
    function lg(m) { 
        var l = document.getElementById('log');
        l.innerHTML += '<div>> ' + m + '</div>'; 
        l.scrollTop = l.scrollHeight; 
    }

    function saveConfig() {
        localStorage.setItem('k1', document.getElementById('gk').value);
        localStorage.setItem('k2', document.getElementById('gt').value);
        localStorage.setItem('k3', document.getElementById('rp').value);
        alert('enregistré !');
    }

    window.onload = function() {
        document.getElementById('gk').value = localStorage.getItem('k1') || '';
        document.getElementById('gt').value = localStorage.getItem('k2') || '';
        document.getElementById('rp').value = localStorage.getItem('k3') || '';
    };

    function runAgent() {
        var k = document.getElementById('gk').value;
        var t = document.getElementById('gt').value;
        var r = document.getElementById('rp').value;
        var p = document.getElementById('pr').value;

        if(!k || !t || !r || !p) { alert("Champs vides !"); return; }

        lg("Démarrage...");

        // Utilisation de .then() au lieu de await pour éviter les blocages Chrome
        fetch("https://api.github.com/repos/" + r + "/contents/index.html", {
            headers: { "Authorization": "token " + t }
        })
        .then(function(res1) { return res1.json(); })
        .then(function(data) {
            var sha = data.sha;
            var old = atob(data.content);
            lg("Code récupéré. IA en cours...");

            return fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + k, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Code:\n"+old+"\nModif:"+p+"\nRéponds juste le code." }]}]})
            });
        })
        .then(function(res2) { return res2.json(); })
        .then(function(gData) {
            var n = gData.candidates[0].content.parts[0].text.replace(/```[a-z]*\n|
```/g, "").trim();
            lg("Réponse IA reçue. Envoi GitHub...");

            return fetch("https://api.github.com/repos/" + r + "/contents/index.html", {
                method: "PUT",
                headers: { "Authorization": "token "+t, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "IA Update",
                    content: btoa(unescape(encodeURIComponent(n))),
                    sha: localStorage.getItem('last_sha') || "" // on utilise le SHA récupéré
                })
            });
        })
        .then(function(final) {
            lg("✅ TERMINÉ !");
        })
        .catch(function(err) {
            lg("Erreur : " + err.message);
        });
    }
</script>
</body>
</html>
