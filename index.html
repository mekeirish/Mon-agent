<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Control Center - Brahim</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --blue: #1f6feb; --green: #238636; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        h2 { font-size: 14px; margin: 0 0 15px 0; color: #58a6ff; text-transform: uppercase; }
        input, textarea { width: 100%; margin-bottom: 12px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #010409; color: white; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .save { background: var(--blue); color: white; }
        .run { background: var(--green); color: white; margin-top: 10px; }
        #log { background: #000; color: #7ee787; padding: 15px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 11px; border-radius: 8px; border: 1px solid var(--border); line-height: 1.5; }
        .error { color: #f85149 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🔑 Configuration</h2>
        <input type="password" id="gk" placeholder="Clé Gemini API">
        <input type="password" id="gt" placeholder="GitHub Personal Token">
        <input type="text" id="rp" placeholder="Pseudo/Nom-du-Repo">
        <button class="btn save" onclick="save()">💾 SAUVEGARDER CONFIG</button>
    </div>

    <div class="card">
        <h2>🤖 Action IA</h2>
        <textarea id="pr" rows="4" placeholder="Ex: Ajoute un menu skeuomorphique et un bouton bleu..."></textarea>
        <button class="btn run" onclick="start()">⚡ APPLIQUER LA MODIFICATION</button>
    </div>

    <div id="log">> Système prêt...</div>
</div>

<script>
    const logger = (msg, isError = false) => {
        const l = document.getElementById('log');
        l.innerHTML += `<div class="${isError ? 'error' : ''}">> ${msg}</div>`;
        l.scrollTop = l.scrollHeight;
    };

    function save() {
        localStorage.setItem('g_key', document.getElementById('gk').value);
        localStorage.setItem('g_tok', document.getElementById('gt').value);
        localStorage.setItem('g_rep', document.getElementById('rp').value);
        alert("Configuration enregistrée !");
    }

    window.onload = () => {
        document.getElementById('gk').value = localStorage.getItem('g_key') || '';
        document.getElementById('gt').value = localStorage.getItem('g_tok') || '';
        document.getElementById('rp').value = localStorage.getItem('g_rep') || '';
    };

    async function start() {
        const k = document.getElementById('gk').value;
        const t = document.getElementById('gt').value;
        const r = document.getElementById('rp').value;
        const p = document.getElementById('pr').value;

        if (!k || !t || !r || !p) return alert("Champs manquants !");

        logger("1. Lecture de index.html sur GitHub...");
        try {
            // Lecture du fichier
            const res = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                headers: { "Authorization": `token ${t}` }
            });
            if (!res.ok) throw new Error("Erreur GitHub (Token ou Repo invalide)");
            const data = await res.json();
            const oldCode = decodeURIComponent(escape(atob(data.content)));

            logger("2. Gemini génère le nouveau code...");
            // Appel Gemini
            const gres = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Voici mon code :\n${oldCode}\n\nApplique cette modif : ${p}\n\nRéponds avec le code COMPLET mis à jour. Aucun texte avant ou après.` }]}]
                })
            });
            const gd = await gres.json();
            let newCode = gd.candidates[0].content.parts[0].text.replace(/```[a-z]*\n|```/g, "").trim();

            logger("3. Envoi de la mise à jour...");
            // Écriture sur GitHub
            const up = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                method: "PUT",
                headers: { "Authorization": `token ${t}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Modif via IA Agent",
                    content: btoa(unescape(encodeURIComponent(newCode))),
                    sha: data.sha
                })
            });

            if (up.ok) logger("✅ SUCCÈS ! Actualise ta page dans 1 minute.");
            else throw new Error("Échec de l'écriture sur GitHub.");

        } catch (e) {
            logger(e.message, true);
        }
    }
</script>
</body>
</html>

    <div class="card" style="padding:10px;">
        <div id="log">> Prêt pour le prochain projet...</div>
    </div>
</div>

<script>
    const logger = (msg, color = "#7ee787") => {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    };

    function saveData() {
        localStorage.setItem('gem_key', document.getElementById('gk').value);
        localStorage.setItem('git_tok', document.getElementById('gt').value);
        localStorage.setItem('git_rep', document.getElementById('rp').value);
        alert("✅ Configuration enregistrée dans le navigateur !");
    }

    window.onload = () => {
        document.getElementById('gk').value = localStorage.getItem('gem_key') || '';
        document.getElementById('gt').value = localStorage.getItem('git_tok') || '';
        document.getElementById('rp').value = localStorage.getItem('git_rep') || '';
    };

    async function startIA() {
        const k = document.getElementById('gk').value;
        const t = document.getElementById('gt').value;
        const r = document.getElementById('rp').value;
        const p = document.getElementById('pr').value;

        if (!k || !t || !r || !p) {
            alert("⚠️ Erreur : Remplis tous les champs !");
            return;
        }

        logger("Connexion à l'API GitHub...", "#58a6ff");

        try {
            // 1. Récupération du fichier
            const getFile = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                headers: { "Authorization": `token ${t}` }
            });
            
            if (!getFile.ok) throw new Error("Impossible de lire le repo. Vérifie ton Token.");
            
            const fileData = await getFile.json();
            const oldContent = decodeURIComponent(escape(atob(fileData.content)));

            logger("Envoi du code à Gemini 1.5 Flash...");

            // 2. Appel à Gemini
            const geminiReq = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `Voici mon fichier HTML :\n${oldContent}\n\nInstruction : ${p}\n\nRéponds UNIQUEMENT le code HTML complet et mis à jour. Pas de texte avant ou après.` }]
                    }]
                })
            });

            const geminiRes = await geminiReq.json();
            let newCode = geminiRes.candidates[0].content.parts[0].text;
            
            // Nettoyage des balises markdown si l'IA en met
            newCode = newCode.replace(/```[a-z]*\n|```/g, "").trim();

            logger("IA a terminé. Envoi vers GitHub...");

            // 3. Mise à jour sur GitHub
            const updateFile = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                method: "PUT",
                headers: { 
                    "Authorization": `token ${t}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "🛠️ Mise à jour via Agent IA Mobile",
                    content: btoa(unescape(encodeURIComponent(newCode))),
                    sha: fileData.sha
                })
            });

            if (updateFile.ok) {
                logger("✅ SUCCÈS TOTAL ! Attends 10s et actualise ton site.", "#238636");
            } else {
                throw new Error("Erreur lors de l'écriture sur GitHub.");
            }

        } catch (error) {
            logger("ERREUR : " + error.message, "#f85149");
        }
    }
</script>

</body>
</html>
