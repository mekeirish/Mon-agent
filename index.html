<!DOCTYPE html>
<html>
<body style="background:#000; color:#fff; padding:20px;">

    <!-- BOUTON SAUVEGARDE : TOUT LE CODE EST DEDANS -->
    <button onclick="localStorage.setItem('k1', document.getElementById('gk').value); localStorage.setItem('k2', document.getElementById('gt').value); localStorage.setItem('k3', document.getElementById('rp').value); alert('OK !');" 
            style="width:100%; padding:20px; background:blue; color:white; border-radius:10px; font-weight:bold;">
        1. CLIQUE ICI POUR SAUVEGARDER
    </button>

    <div style="margin-top:20px;">
        <input id="gk" placeholder="Clé Gemini" style="width:100%; margin-bottom:10px; padding:10px;">
        <input id="gt" placeholder="Token GitHub" style="width:100%; margin-bottom:10px; padding:10px;">
        <input id="rp" placeholder="Pseudo/Repo" style="width:100%; margin-bottom:10px; padding:10px;">
    </div>

    <script>
        // Ce petit script sert juste à remplir les cases au démarrage
        document.getElementById('gk').value = localStorage.getItem('k1') || '';
        document.getElementById('gt').value = localStorage.getItem('k2') || '';
        document.getElementById('rp').value = localStorage.getItem('k3') || '';
    </script>

</body>
</html>
