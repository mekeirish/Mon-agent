<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        input, textarea, button { width: 100%; margin-top: 10px; padding: 15px; border-radius: 8px; border: none; box-sizing: border-box; }
        button { font-weight: bold; cursor: pointer; }
        #log { margin-top: 20px; color: #0f0; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

    <input type="password" id="gk" placeholder="Clé Gemini">
    <input type="password" id="gt" placeholder="Token GitHub">
    <input type="text" id="rp" placeholder="Pseudo/Nom-du-Repo">
    <button onclick="localStorage.setItem('k1',document.getElementById('gk').value);localStorage.setItem('k2',document.getElementById('gt').value);localStorage.setItem('k3',document.getElementById('rp').value);alert('OK !');" style="background: #4facfe;">💾 SAUVEGARDER</button>

    <hr style="margin: 20px 0; border: 0.5px solid #333;">

    <textarea id="pr" placeholder="Quelle modif ?"></textarea>
    <button id="runBtn" style="background: #00c853;">⚡ EXÉCUTER</button>

    <div id="log">Prêt...</div>

<script>
    // Chargement auto
    document.getElementById('gk').value = localStorage.getItem('k1') || '';
    document.getElementById('gt').value = localStorage.getItem('k2') || '';
    document.getElementById('rp').value = localStorage.getItem('k3') || '';

    const log = m => document.getElementById('log').innerHTML += "<div>> " + m + "</div>";

    document.getElementById('runBtn').addEventListener('click', async () => {
        const k = document.getElementById('gk').value;
        const t = document.getElementById('gt').value;
        const r = document.getElementById('rp').value;
        const p = document.getElementById('pr').value;

        log("Connexion...");
        try {
            const res = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                headers: { "Authorization": `token ${t}` }
            });
            const data = await res.json();
            const old = decodeURIComponent(escape(atob(data.content)));

            log("IA...");
            const gres = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Code:\n"+old+"\nModif:"+p+"\nRéponds juste le code complet." }]}]})
            });
            const gData = await gres.json();
            const newCode = gData.candidates[0].content.parts[0].text.replace(/```[a-z]*\n|```/g, "").trim();

            log("Envoi...");
            const up = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                method: "PUT",
                headers: { "Authorization": `token ${t}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Update IA", content: btoa(unescape(encodeURIComponent(newCode))), sha: data.sha })
            });

            if(up.ok) log("✅ SUCCÈS !"); else log("❌ Échec");
        } catch(e) { log("Erreur: " + e.message); }
    });
</script>
</body>
</html>
