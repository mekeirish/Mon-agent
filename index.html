<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent IA Brahim - V2.0</title>
    <!-- Balises pour l'installation Mobile (PWA) -->
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --blue: #1f6feb; --green: #238636; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 18px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        h2 { font-size: 12px; margin: 0 0 10px 0; color: #58a6ff; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #010409; color: white; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus, textarea:focus { border-color: var(--blue); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; color: white; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        #log { background: #000; color: #7ee787; padding: 15px; height: 180px; overflow-y: auto; font-family: "SF Mono", monospace; font-size: 11px; border-radius: 8px; border: 1px solid var(--border); line-height: 1.5; }
        .err { color: #f85149; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🔑 Configuration (Auto-Save)</h2>
        <!-- Ajout de oninput pour sauvegarder à chaque lettre tapée -->
        <input type="password" id="gk" placeholder="Clé API Gemini" oninput="save()">
        <input type="password" id="gt" placeholder="GitHub Token" oninput="save()">
        <input type="text" id="rp" placeholder="Pseudo/Nom-du-Repo" oninput="save()">
    </div>

    <div class="card">
        <h2>🤖 Modification IA</h2>
        <textarea id="pr" rows="4" placeholder="Ex: Change le design en Neumorphisme sombre..."></textarea>
        <button class="btn" style="background:var(--green);" onclick="start()">⚡ APPLIQUER LA MODIFICATION</button>
    </div>

    <div id="log">> Système prêt. Tes clés sont sauvegardées localement.</div>
</div>

<script>
    // --- SYSTÈME DE SAUVEGARDE PERSISTANTE ---
    function save() {
        localStorage.setItem('k_gem', document.getElementById('gk').value.trim());
        localStorage.setItem('k_git', document.getElementById('gt').value.trim());
        localStorage.setItem('k_rep', document.getElementById('rp').value.trim());
    }

    // Chargement automatique au démarrage
    window.onload = () => {
        document.getElementById('gk').value = localStorage.getItem('k_gem') || '';
        document.getElementById('gt').value = localStorage.getItem('k_git') || '';
        document.getElementById('rp').value = localStorage.getItem('k_rep') || '';
        logger("Configuration chargée depuis la mémoire locale.");
    };

    const logger = (m, isErr = false) => {
        const l = document.getElementById('log');
        l.innerHTML += `<div class="${isErr ? 'err' : ''}">> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    };

    // --- MOTEUR DE MODIFICATION ---
    async function start() {
        const k = document.getElementById('gk').value;
        const t = document.getElementById('gt').value;
        const r = document.getElementById('rp').value;
        const p = document.getElementById('pr').value;

        if (!k || !t || !r || !p) return alert("Remplis tous les champs !");

        document.getElementById('log').innerHTML = "";
        logger("Démarrage du cycle de modification...");

        try {
            // 1. Détection dynamique du modèle (pour ne plus avoir d'erreur 404)
            logger("Détection du modèle autorisé...");
            const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
            const listData = await listRes.json();
            if (listData.error) throw new Error("Clé Gemini invalide : " + listData.error.message);
            
            const model = listData.models.find(m => m.supportedGenerationMethods.includes("generateContent"));
            const modelName = model ? model.name.split('/').pop() : "gemini-pro";
            logger(`Modèle utilisé : ${modelName}`);

            // 2. Lecture GitHub
            logger("Lecture du fichier index.html...");
            const gitRes = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                headers: { "Authorization": `token ${t}` }
            });
            if (!gitRes.ok) throw new Error("GitHub : Repository introuvable (" + gitRes.status + ")");
            const gitData = await gitRes.json();
            const oldCode = decodeURIComponent(escape(atob(gitData.content)));

            // 3. Appel IA
            logger("L'IA prépare le nouveau code...");
            const gres = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${k}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Voici mon code HTML :\n${oldCode}\n\nApplique cette modification : ${p}\n\nRéponds UNIQUEMENT le code HTML complet mis à jour.` }]}]
                })
            });
            const gd = await gres.json();
            if (!gd.candidates) throw new Error("L'IA n'a pas pu générer de réponse.");
            
            let newCode = gd.candidates[0].content.parts[0].text;
            newCode = newCode.replace(/```[a-z]*\n|
```/g, "").trim();

            // 4. Envoi vers GitHub
            logger("Envoi de la mise à jour vers GitHub...");
            const up = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                method: "PUT",
                headers: { "Authorization": `token ${t}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Modif IA : " + p.substring(0, 30),
                    content: btoa(unescape(encodeURIComponent(newCode))),
                    sha: gitData.sha
                })
            });

            if (up.ok) logger("✅ RÉUSSI ! Actualise ta page dans 30-60 secondes.", false);
            else throw new Error("Échec de l'écriture sur GitHub.");

        } catch (e) {
            logger(e.message, true);
            console.error(e);
        }
    }
</script>
</body>
</html>
