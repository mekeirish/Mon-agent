<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent IA Brahim - Fix 404</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #010409; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        #log { background: #000; color: #7ee787; padding: 15px; height: 150px; overflow-y: auto; font-family: monospace; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <input type="password" id="gk" placeholder="Clé API Gemini">
        <input type="password" id="gt" placeholder="GitHub Token">
        <input type="text" id="rp" placeholder="Pseudo/Nom-du-Repo">
        <button class="btn" onclick="save()" style="background:#1f6feb;">💾 SAUVEGARDER</button>
    </div>

    <div class="card">
        <textarea id="pr" rows="4" placeholder="Instruction de modif..."></textarea>
        <button class="btn" onclick="start()" style="background:#238636;">⚡ APPLIQUER</button>
    </div>

    <div id="log">> Système prêt...</div>

<script>
    const logger = (m, c="#7ee787") => {
        const l = document.getElementById('log');
        l.innerHTML += `<div style="color:${c}">> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    };

    function save() {
        localStorage.setItem('k_gem', document.getElementById('gk').value.trim());
        localStorage.setItem('k_git', document.getElementById('gt').value.trim());
        localStorage.setItem('k_rep', document.getElementById('rp').value.trim());
        alert("Config OK");
    }

    window.onload = () => {
        document.getElementById('gk').value = localStorage.getItem('k_gem') || '';
        document.getElementById('gt').value = localStorage.getItem('k_git') || '';
        document.getElementById('rp').value = localStorage.getItem('k_rep') || '';
    };

    async function start() {
        const k = document.getElementById('gk').value;
        const t = document.getElementById('gt').value;
        const r = document.getElementById('rp').value;
        const p = document.getElementById('pr').value;

        document.getElementById('log').innerHTML = "";
        logger("1. Lecture GitHub...");

        try {
            // GITHUB READ
            const res = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                headers: { "Authorization": `token ${t}` }
            });
            if (!res.ok) throw new Error("GitHub Error: " + res.status);
            const data = await res.json();
            const oldCode = decodeURIComponent(escape(atob(data.content)));

            logger("2. Appel IA (v1 stable)...");
            
            // URL MODIFIÉE ICI : v1 au lieu de v1beta
            const gres = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${k}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Code actuel:\n${oldCode}\n\nModif: ${p}\n\nRéponds avec le code complet.` }]}]
                })
            });

            const gd = await gres.json();

            if (gd.error) throw new Error("Gemini: " + gd.error.message);

            let newCode = gd.candidates[0].content.parts[0].text;
            newCode = newCode.replace(/```[a-z]*\n|```/g, "").trim();

            logger("3. Envoi GitHub...");
            const up = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                method: "PUT",
                headers: { "Authorization": `token ${t}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "IA Update",
                    content: btoa(unescape(encodeURIComponent(newCode))),
                    sha: data.sha
                })
            });

            if (up.ok) logger("✅ RÉUSSI ! Attends 30s.", "#238636");
            else throw new Error("Échec push GitHub");

        } catch (e) {
            logger(e.message, "#f85149");
        }
    }
</script>
</body>
</html>
