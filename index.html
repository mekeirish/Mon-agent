<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent IA - Diagnostic</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 15px; }
        .card { background: #161b22; padding: 15px; border-radius: 10px; border: 1px solid #30363d; margin-bottom: 10px; }
        input, textarea { width: 100%; margin: 5px 0; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #000; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        #log { background: #000; color: #7ee787; padding: 15px; height: 250px; overflow-y: auto; font-family: monospace; font-size: 11px; border-radius: 8px; border: 1px solid #30363d; }
        .blue { background: #1f6feb; }
        .green { background: #238636; }
    </style>
</head>
<body>

    <div class="card">
        <input type="password" id="gk" placeholder="Clé API Gemini">
        <input type="password" id="gt" placeholder="GitHub Token">
        <input type="text" id="rp" placeholder="Pseudo/Repo">
        <button class="blue" onclick="save()">💾 SAUVEGARDER</button>
    </div>

    <div class="card">
        <textarea id="pr" rows="3" placeholder="Instruction..."></textarea>
        <button class="green" onclick="start()">⚡ TESTER & APPLIQUER</button>
    </div>

    <div id="log">> Prêt pour le diagnostic...</div>

<script>
    const logger = (m, color = "#7ee787") => {
        document.getElementById('log').innerHTML += `<div style="color:${color}">> ${m}</div>`;
        document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
    };

    function save() {
        localStorage.setItem('k1', document.getElementById('gk').value.trim());
        localStorage.setItem('k2', document.getElementById('gt').value.trim());
        localStorage.setItem('k3', document.getElementById('rp').value.trim());
        alert("Config OK");
    }

    window.onload = () => {
        document.getElementById('gk').value = localStorage.getItem('k1') || '';
        document.getElementById('gt').value = localStorage.getItem('k2') || '';
        document.getElementById('rp').value = localStorage.getItem('k3') || '';
    };

    async function start() {
        const k = document.getElementById('gk').value;
        const t = document.getElementById('gt').value;
        const r = document.getElementById('rp').value;
        const p = document.getElementById('pr').value;

        document.getElementById('log').innerHTML = "";
        logger("DÉBUT DU DIAGNOSTIC...");

        try {
            // 1. Lister les modèles disponibles
            logger("Vérification des modèles autorisés pour ta clé...");
            const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
            const listData = await listRes.json();

            if (listData.error) throw new Error("Clé API invalide : " + listData.error.message);

            // On cherche un modèle qui supporte generateContent
            const model = listData.models.find(m => m.supportedGenerationMethods.includes("generateContent"));
            
            if (!model) throw new Error("Aucun modèle trouvé pour cette clé.");
            
            const modelName = model.name.split('/').pop();
            logger(`MODÈLE DÉTECTÉ : ${modelName}`, "#58a6ff");

            // 2. Lire GitHub
            logger("Lecture GitHub...");
            const gitRes = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                headers: { "Authorization": `token ${t}` }
            });
            const gitData = await gitRes.json();
            const oldCode = decodeURIComponent(escape(atob(gitData.content)));

            // 3. Appel IA avec le modèle détecté
            logger(`Appel IA avec ${modelName}...`);
            const gres = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${k}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Code actuel:\n${oldCode}\n\nModif: ${p}\n\nRéponds avec le code complet.` }]}]
                })
            });

            const gd = await gres.json();
            let newCode = gd.candidates[0].content.parts[0].text.replace(/```[a-z]*\n|```/g, "").trim();

            // 4. Update
            logger("Envoi vers GitHub...");
            const up = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                method: "PUT",
                headers: { "Authorization": `token ${t}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Modif IA",
                    content: btoa(unescape(encodeURIComponent(newCode))),
                    sha: gitData.sha
                })
            });

            if (up.ok) logger("✅ RÉUSSI AVEC " + modelName, "#238636");
            else logger("❌ Erreur GitHub", "red");

        } catch (e) {
            logger("ERREUR : " + e.message, "#f85149");
            console.error(e);
        }
    }
</script>
</body>
</html>
