<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent IA - PWA Stable</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: #161b22; padding: 15px; border-radius: 10px; border: 1px solid #30363d; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input, textarea { width: 100%; margin: 5px 0; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #000; color: white; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        #log { background: #000; color: #7ee787; padding: 15px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 11px; border-radius: 8px; border: 1px solid #30363d; }
        .blue { background: #1f6feb; }
        .green { background: #238636; }
    </style>
</head>
<body>

    <div class="card">
        <input type="password" id="gk" placeholder="Clé API Gemini" oninput="save()">
        <input type="password" id="gt" placeholder="GitHub Token" oninput="save()">
        <input type="text" id="rp" placeholder="Pseudo/Repo" oninput="save()">
        <button class="blue" onclick="manualSave()">💾 SAUVEGARDER CONFIG</button>
    </div>

    <div class="card">
        <textarea id="pr" rows="3" placeholder="Instruction (ex: Remets le fond bleu sombre)"></textarea>
        <button class="green" onclick="start()">⚡ APPLIQUER LA MODIF</button>
    </div>

    <div id="log">> Prêt...</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const logger = (m, color = "#7ee787") => {
        document.getElementById('log').innerHTML += `<div style="color:${color}">> ${m}</div>`;
        document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
    };

    function save() {
        localStorage.setItem('k1', document.getElementById('gk').value.trim());
        localStorage.setItem('k2', document.getElementById('gt').value.trim());
        localStorage.setItem('k3', document.getElementById('rp').value.trim());
    }

    function manualSave() { save(); alert("Sauvegardé !"); }

    window.onload = () => {
        document.getElementById('gk').value = localStorage.getItem('k1') || '';
        document.getElementById('gt').value = localStorage.getItem('k2') || '';
        document.getElementById('rp').value = localStorage.getItem('k3') || '';
    };

    async function start() {
        const k = document.getElementById('gk').value;
        const t = document.getElementById('gt').value;
        const r = document.getElementById('rp').value;
        const p = document.getElementById('pr').value;

        document.getElementById('log').innerHTML = "";
        logger("DÉBUT DU PROCESSUS...");

        try {
            const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
            const listData = await listRes.json();
            const model = listData.models.find(m => m.supportedGenerationMethods.includes("generateContent"));
            const modelName = model.name.split('/').pop();

            const gitRes = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                headers: { "Authorization": `token ${t}` }
            });
            const gitData = await gitRes.json();
            const oldCode = decodeURIComponent(escape(atob(gitData.content)));

            logger(`IA (${modelName}) en cours...`);
            const gres = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${k}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `INSTRUCTION STRICTE : Tu es un éditeur de code. Ne parle pas. Ne salue pas. Ne commente pas.
                    Voici le code actuel :
                    ${oldCode}
                    
                    Action demandée : ${p}
                    
                    Réponds UNIQUEMENT avec le nouveau code HTML complet, sans aucune explication avant ou après.` }]}]
                })
            });

            const gd = await gres.json();
            let rawResponse = gd.candidates[0].content.parts[0].text;
            
            // Nettoyage ultra-strict du Markdown et des textes parasites
            let newCode = rawResponse.replace(/```html|
```/g, "").trim();
            
            // Sécurité : Si l'IA a quand même écrit du texte avant <!DOCTYPE, on cherche le début du HTML
            const htmlStart = newCode.toLowerCase().indexOf("<!doctype");
            if (htmlStart !== -1) {
                newCode = newCode.substring(htmlStart);
            }

            logger("Mise à jour GitHub...");
            const up = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                method: "PUT",
                headers: { "Authorization": `token ${t}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Modif via Agent : " + p,
                    content: btoa(unescape(encodeURIComponent(newCode))),
                    sha: gitData.sha
                })
            });

            if (up.ok) logger("✅ RÉUSSI ! Recharge dans 30s.", "#238636");
            else logger("❌ Erreur GitHub", "red");

        } catch (e) {
            logger("ERREUR : " + e.message, "#f85149");
        }
    }
</script>
</body>
</html>
