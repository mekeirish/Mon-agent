<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 15px; }
        .card { background: #161b22; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 15px; }
        input, textarea { width: 100%; margin: 8px 0; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: white; }
        #log { font-family: monospace; color: #7ee787; font-size: 11px; padding: 10px; background: #000; border-radius: 5px; min-height: 50px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#58a6ff; font-size:14px; margin:0;">1. CONFIGURATION</h2>
        <input type="password" id="gk" placeholder="Clé Gemini">
        <input type="password" id="gt" placeholder="Token GitHub">
        <input type="text" id="rp" placeholder="Pseudo/Nom-du-Repo">
        <button onclick="save()" style="background:#1f6feb;">💾 SAUVEGARDER</button>
    </div>

    <div class="card">
        <h2 style="color:#238636; font-size:14px; margin:0;">2. MODIFICATION</h2>
        <textarea id="pr" rows="4" placeholder="Ex: Change le titre en rouge..."></textarea>
        <button onclick="run()" style="background:#238636;">⚡ APPLIQUER</button>
    </div>

    <div id="log">Prêt...</div>

    <script>
        function save() {
            localStorage.setItem('k1', document.getElementById('gk').value);
            localStorage.setItem('k2', document.getElementById('gt').value);
            localStorage.setItem('k3', document.getElementById('rp').value);
            alert("Sauvegardé !");
        }

        window.onload = () => {
            document.getElementById('gk').value = localStorage.getItem('k1') || '';
            document.getElementById('gt').value = localStorage.getItem('k2') || '';
            document.getElementById('rp').value = localStorage.getItem('k3') || '';
        };

        async function run() {
            const k=document.getElementById('gk').value, t=document.getElementById('gt').value, r=document.getElementById('rp').value, p=document.getElementById('pr').value;
            const logBox=document.getElementById('log');
            const log=m=>logBox.innerHTML+="<div>> "+m+"</div>";
            
            logBox.innerHTML = ""; // Nettoyer le log
            log("Démarrage...");

            try {
                // 1. Lire GitHub
                const res = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {headers:{Authorization:`token ${t}`}});
                if(!res.ok) throw new Error("GitHub: Repo ou Token invalide");
                const data = await res.json();
                const old = decodeURIComponent(escape(atob(data.content)));

                // 2. IA Gemini
                log("Appel Gemini...");
                const gres = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                    method:"POST", 
                    headers: {"Content-Type": "application/json"},
                    body:JSON.stringify({contents:[{parts:[{text:"Voici mon code actuel :\n"+old+"\n\nConsigne : "+p+"\n\nRéponds UNIQUEMENT avec le code HTML complet mis à jour sans texte autour."}]}]})
                });

                const gd = await gres.json();
                
                // --- VÉRIFICATION DE LA RÉPONSE IA ---
                if (!gd.candidates || !gd.candidates[0]) {
                    console.log(gd);
                    throw new Error("Gemini n'a pas pu répondre. Vérifie ta clé API.");
                }

                const newCode = gd.candidates[0].content.parts[0].text.replace(/```[a-z]*\n|```/g, "").trim();
                
                // 3. Envoyer GitHub
                log("Envoi à GitHub...");
                const up = await fetch(`https://api.github.com/repos/${r}/contents/index.html`, {
                    method:"PUT", 
                    headers:{Authorization:`token ${t}`, "Content-Type": "application/json"},
                    body:JSON.stringify({message:"IA modif", content:btoa(unescape(encodeURIComponent(newCode))), sha:data.sha})
                });

                if(up.ok) log("✅ MODIFICATION RÉUSSIE !"); 
                else log("❌ Erreur lors de l'enregistrement GitHub.");

            } catch(e) { 
                log("<span style='color:red;'>Erreur: " + e.message + "</span>"); 
            }
        }
    </script>
</body>
</html>
